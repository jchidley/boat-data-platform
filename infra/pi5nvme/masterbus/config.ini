# MasterBus transport config for pi5nvme.
# Initial mode is intentionally passive: use the existing Mastervolt system
# master if one is present. If discovery is poor or there is no existing master,
# uncomment heartbeat_master after review.
# heartbeat_master = 000001

# Mastervolt USB Interface / MasterBus USB Link. device_name blank means first link found.
device_type = usb
device_name =

# Persist discovered device schemas here.
cache_dir = /var/lib/masterbus
