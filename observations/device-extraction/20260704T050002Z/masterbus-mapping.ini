# masterbus-signalk Signal K mapping.
# Edit the true/false flags below while the service is STOPPED, then restart.
# Keys: <instance>.<menu>[.<group>] = true|false  (a group line overrides the
# menu line). New devices are added automatically: the menu-level toggle
# defaults to false and the battery `cluster` group to true.

# aft-solars — groups: general, shunt
aft-solars.monitoring = true

# alpha-port — groups: alternator, battery, general, shunt
alpha-port.monitoring = true

# alpha-stbd — groups: alternator, battery, general, shunt
alpha-stbd.monitoring = true

# battery-2 — groups: battery, relay
battery-2.monitoring = true

# combimaster — groups: ac-in, ac-out, dc-in-out, general
combimaster.monitoring = true

# easyview-5 — groups: general, power-save, switches, widgets
easyview-5.monitoring = true

# fwd-solars — groups: general, shunt
fwd-solars.monitoring = true

# house-batt — groups: battery, cluster, relay
house-batt.monitoring = true
house-batt.monitoring.cluster = true
